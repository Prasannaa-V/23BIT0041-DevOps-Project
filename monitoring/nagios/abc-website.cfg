# Nagios object definitions for monitoring the ABC Technologies website
# Copy this file into /usr/local/nagios/etc/objects/ and add
#   cfg_file=/usr/local/nagios/etc/objects/abc-website.cfg
# to nagios.cfg, then restart the nagios service.

define host {
    use                     linux-server
    host_name               abc-website-host
    alias                   ABC Technologies Web Server
    address                 127.0.0.1        ; replace with actual host/VM IP running Docker/K8s
    max_check_attempts      5
    check_period             24x7
    notification_interval    30
    notification_period      24x7
}

define service {
    use                     generic-service
    host_name               abc-website-host
    service_description     HTTP Website Availability
    check_command           check_http!-p 8081 -u /health -e 200
    max_check_attempts      3
    check_interval          1
    retry_interval          1
    check_period             24x7
    notification_interval    15
    notification_period      24x7
}

define service {
    use                     generic-service
    host_name               abc-website-host
    service_description     PING
    check_command           check_ping!100.0,20%!500.0,60%
    max_check_attempts      3
    check_interval          1
    retry_interval          1
    check_period             24x7
    notification_interval    15
    notification_period      24x7
}
